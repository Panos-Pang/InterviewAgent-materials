<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代面 InterviewAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070a0f;
      --bg-2: #0b1018;
      --panel: rgba(16, 22, 32, 0.72);
      --panel-strong: rgba(20, 28, 40, 0.88);
      --line: rgba(220, 232, 255, 0.12);
      --line-strong: rgba(220, 232, 255, 0.2);
      --text: #eef5ff;
      --muted: #9aa9bd;
      --soft: #c7d3e3;
      --blue: #7cb7ff;
      --cyan: #53d6be;
      --indigo: #aeb9ff;
      --amber: #f7bf64;
      --rose: #f09aae;
      --green: #98d87f;
      --radius: 8px;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
      --ease: 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
      --cursor-x: 50vw;
      --cursor-y: 50vh;
      --cursor-opacity: 0;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(12, 17, 25, 0.98), rgba(5, 8, 13, 1) 62%),
        var(--bg);
      overflow-x: hidden;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.1) 76%, transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        radial-gradient(circle at 20% 10%, rgba(124, 183, 255, 0.14), transparent 24%),
        linear-gradient(115deg, transparent 0 23%, rgba(83, 214, 190, 0.08) 25%, transparent 28% 55%, rgba(247, 191, 100, 0.08) 58%, transparent 61%),
        repeating-linear-gradient(110deg, rgba(255,255,255,0.018) 0, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 8px);
    }

    button {
      color: inherit;
      font: inherit;
    }

    .spectral-lines {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.5;
    }

    .cursor-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: var(--cursor-opacity);
      background:
        radial-gradient(
          circle 90px at var(--cursor-x) var(--cursor-y),
          rgba(124, 183, 255, 0.065) 0%,
          rgba(112, 205, 230, 0.052) 16%,
          rgba(83, 214, 190, 0.028) 38%,
          transparent 56%
        );
      mix-blend-mode: screen;
      transition: opacity 220ms ease;
    }

    .spectral-lines path {
      fill: none;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-dasharray: 12 18;
      animation: drift 16s linear infinite;
    }

    @keyframes drift {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -260; }
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(120px, 1fr);
      gap: 20px;
      align-items: center;
      padding: 18px clamp(20px, 4vw, 48px);
      background: linear-gradient(180deg, rgba(7, 10, 15, 0.92), rgba(7, 10, 15, 0.66));
      border-bottom: 1px solid rgba(220, 232, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--blue);
      box-shadow: 0 0 18px rgba(124, 183, 255, 0.85);
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 14px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .version-pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 99px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .top-nav {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(104px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .nav-btn {
      position: relative;
      min-height: 36px;
      min-width: 104px;
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: color var(--ease), background var(--ease), box-shadow var(--ease);
    }

    .nav-btn::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 4px;
      height: 2px;
      border-radius: 99px;
      opacity: 0;
      transform: scaleX(0.25);
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--amber));
      transition: opacity var(--ease), transform var(--ease);
    }

    .nav-btn:hover { color: var(--soft); }
    .nav-btn.active {
      color: #ffffff;
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 1px rgba(220,232,255,0.12), 0 12px 26px rgba(0,0,0,0.18);
    }
    .nav-btn.active::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .header-actions {
      display: flex;
      justify-content: flex-end;
    }

    .lang-btn {
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.045);
      color: var(--soft);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      transition: border-color var(--ease), background var(--ease), color var(--ease);
    }

    .lang-btn:hover {
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.075);
      color: #fff;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 48px 0 72px;
    }

    .page-intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: end;
      padding: 26px 0 30px;
      border-bottom: 1px solid rgba(220,232,255,0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .page-title {
      margin: 0;
      color: #fff;
      font-size: clamp(30px, 4vw, 38px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
    }

    .page-subtitle {
      max-width: 740px;
      margin: 14px 0 0;
      color: var(--soft);
      font-size: 16px;
      line-height: 1.72;
    }

    .signal-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(116px, 1fr));
      gap: 8px;
      min-width: 360px;
    }

    .signal {
      min-height: 74px;
      padding: 12px;
      border: 1px solid rgba(220,232,255,0.1);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.035);
    }

    .signal strong {
      display: block;
      color: #fff;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 800;
    }

    .signal span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 600;
    }

    .content-stage {
      padding-top: 30px;
    }

    .app-shell.page-switch-next {
      animation: pageSlideNext 360ms cubic-bezier(0.22, 0.72, 0.22, 1) both;
    }

    .app-shell.page-switch-prev {
      animation: pageSlidePrev 360ms cubic-bezier(0.22, 0.72, 0.22, 1) both;
    }

    @keyframes pageSlideNext {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pageSlidePrev {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .module-stack {
      display: grid;
      gap: 12px;
    }

    .module-item {
      position: relative;
      isolation: isolate;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(18, 25, 36, 0.78), rgba(12, 17, 25, 0.72));
      box-shadow: 0 14px 40px rgba(0,0,0,0.18);
      overflow: hidden;
      transition: border-color var(--ease), background var(--ease), box-shadow var(--ease);
    }

    .module-item::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      opacity: 0;
      background:
        radial-gradient(circle at 18% 0%, rgba(112,132,154,0.055), transparent 30%),
        linear-gradient(135deg, rgba(112,132,154,0.035), transparent 42%);
      transition: opacity 420ms ease;
    }

    .module-item:hover {
      border-color: rgba(124,150,180,0.18);
      box-shadow: 0 18px 52px rgba(0,0,0,0.26);
    }

    .module-item.expanded {
      border-color: var(--accent-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.038), rgba(255,255,255,0.018)),
        linear-gradient(135deg, var(--accent-soft), transparent 38%);
      box-shadow: var(--shadow);
    }

    .module-item.expanded::before {
      opacity: 0.62;
    }

    .module-header {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 112px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .module-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      background: var(--accent-soft);
      font-size: 17px;
    }

    .module-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 7px;
    }

    .module-title {
      color: #fff;
      font-size: 22px;
      line-height: 1.22;
      font-weight: 800;
    }

    .module-code {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 8px;
      border: 1px solid var(--accent-border);
      border-radius: 99px;
      color: #b7c7d9;
      background: rgba(112,132,154,0.04);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .module-subtitle {
      margin: 0;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.55;
    }

    .chevron {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      transition: transform var(--ease), color var(--ease), border-color var(--ease);
    }

    .module-item.expanded .chevron {
      transform: rotate(180deg);
      color: #fff;
      border-color: var(--accent-border);
    }

    .module-body-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 460ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .module-item.expanded .module-body-shell { grid-template-rows: 1fr; }
    .module-body {
      min-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 260ms ease, transform 360ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .module-item.expanded .module-body {
      opacity: 1;
      transform: translateY(0);
    }

    .module-detail {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 28px;
      padding: 0 22px 22px 74px;
    }

    .detail-column {
      display: grid;
      gap: 22px;
    }

    .detail-group {
      padding-left: 16px;
      border-left: 2px solid var(--accent-border);
    }

    .detail-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 9px;
      color: #fff;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 800;
    }

    .detail-dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      flex: 0 0 auto;
    }

    .detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .detail-list li {
      position: relative;
      padding-left: 15px;
      color: var(--soft);
      font-size: 14.5px;
      line-height: 1.62;
    }

    .detail-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.75em;
      width: 4px;
      height: 4px;
      border-radius: 99px;
      background: var(--accent);
      opacity: 0.85;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 22px 24px 74px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(220,232,255,0.11);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
    }

    .tech-grid {
      display: grid;
      gap: 18px;
    }

    .flow-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(16, 23, 33, 0.8), rgba(10, 15, 22, 0.76));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .flow-heading {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 20px 22px 12px;
      border-bottom: 1px solid rgba(220,232,255,0.08);
    }

    .flow-heading h3 {
      margin: 0;
      color: #fff;
      font-size: 22px;
      line-height: 1.22;
      font-weight: 800;
    }

    .flow-heading p {
      max-width: 560px;
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.62;
    }

    .flow-svg-wrap {
      overflow-x: auto;
      padding: 18px 12px;
      border-top: 1px solid rgba(220,232,255,0.08);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        #0e141c;
      background-size: 34px 34px;
    }

    .flow-svg {
      display: block;
      width: min(100%, 760px);
      min-width: 640px;
      height: auto;
      margin: 0 auto;
      overflow: visible;
    }

    .flow-svg text {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      pointer-events: none;
      letter-spacing: 0;
    }

    .flow-svg .node-text {
      paint-order: stroke;
      stroke: rgba(10, 14, 20, 0.18);
      stroke-width: 1.6px;
      stroke-linejoin: round;
    }

    .flow-svg .section-label,
    .flow-svg .legend-text,
    .flow-svg .edge-label {
      paint-order: stroke;
      stroke: #0e141c;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .flow-svg .connector,
    .flow-svg .node-rect,
    .flow-svg .node-diamond,
    .flow-svg .section-rect,
    .flow-svg .legend-swatch {
      vector-effect: non-scaling-stroke;
    }

    .logic-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .logic-node {
      min-height: 104px;
      padding: 16px;
      border: 1px solid rgba(220,232,255,0.11);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.028));
    }

    .logic-node b {
      display: block;
      color: #fff;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 800;
    }

    .logic-node span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .manual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .manual-block {
      min-height: 182px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025)),
        rgba(10, 15, 22, 0.62);
      box-shadow: 0 14px 44px rgba(0,0,0,0.18);
    }

    .manual-block h3 {
      margin: 0;
      color: #fff;
      font-size: 21px;
      line-height: 1.25;
      font-weight: 800;
    }

    .manual-block p {
      margin: 10px 0 0;
      color: var(--soft);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .manual-list {
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .manual-list li {
      position: relative;
      padding-left: 15px;
      color: var(--soft);
      font-size: 14.5px;
      line-height: 1.55;
    }

    .manual-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.75em;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--cyan);
    }

    .manual-media-toggle {
      margin-top: 16px;
      border: 1px solid rgba(124,183,255,0.22);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(124,183,255,0.08), rgba(124,183,255,0.025)),
        rgba(5, 9, 14, 0.48);
      overflow: hidden;
    }

    .manual-media-toggle summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      color: #f4f8ff;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 800;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .manual-media-toggle summary::-webkit-details-marker {
      display: none;
    }

    .manual-media-toggle summary::after {
      content: "+";
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(124,183,255,0.35);
      border-radius: 50%;
      color: var(--blue);
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      transition: transform var(--ease), background var(--ease);
    }

    .manual-media-toggle[open] summary::after {
      content: "-";
      transform: rotate(180deg);
      background: rgba(124,183,255,0.12);
    }

    .manual-media-panel {
      padding: 0 14px 14px;
    }

    .manual-media-panel img,
    .manual-media-panel video {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid rgba(220,232,255,0.12);
      border-radius: var(--radius);
      background: rgba(0,0,0,0.22);
    }

    .cursor-tip {
      position: fixed;
      z-index: 50;
      max-width: 260px;
      padding: 9px 12px;
      border: 1px solid rgba(220,232,255,0.15);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.92);
      color: #fff;
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px) scale(0.98);
      transition: opacity var(--ease), transform var(--ease);
    }

    .cursor-tip.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .tip-main {
      display: block;
      font-size: 12px;
      line-height: 1.3;
      font-weight: 800;
    }

    .tip-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    @media (max-width: 960px) {
      .app-header {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .top-nav {
        width: 100%;
        grid-template-columns: repeat(3, 1fr);
      }

      .nav-btn {
        min-width: 0;
        padding-inline: 8px;
      }

      .header-actions {
        position: absolute;
        right: 20px;

    function addDefs(svg, prefix) {
      const defs = svgEl("defs");

      const shadow = svgEl("filter", {
        id: `${prefix}-soft-shadow`,
        x: "-15%",
        y: "-25%",
        width: "130%",
        height: "150%"
      }, [
        svgEl("feDropShadow", {
          dx: 0,
          dy: 4,
          stdDeviation: 4,
          "flood-color": "#000000",
          "flood-opacity": 0.26
        })
      ]);
      defs.appendChild(shadow);

      Object.entries(PALETTE).forEach(([key, theme]) => {
        const gradient = svgEl("linearGradient", {
          id: `${prefix}-${key}`,
          x1: "0%",
          y1: "0%",
          x2: "100%",
          y2: "100%"
        }, [
          svgEl("stop", { offset: "0%", "stop-color": theme.fill }),
          svgEl("stop", { offset: "100%", "stop-color": theme.fill2 })
        ]);
        defs.appendChild(gradient);
      });

      const marker = svgEl("marker", {
        id: `${prefix}-arrow`,
        viewBox: "0 0 10 10",
        refX: 8,
        refY: 5,
        markerWidth: 7,
        markerHeight: 7,
        orient: "auto-start-reverse"
      }, [
        svgEl("path", {
          d: "M2 1L8 5L2 9",
          fill: "none",
          stroke: neutral.line,
          "stroke-width": 1.8,
          "stroke-linecap": "round",
          "stroke-linejoin": "round"
        })
      ]);
      defs.appendChild(marker);

      svg.appendChild(defs);
    }

    function drawText(svg, spec) {
      const text = svgEl("text", {
        x: spec.x,
        y: spec.y,
        "text-anchor": spec.anchor || "middle",
        "dominant-baseline": spec.baseline || "central",
        fill: spec.fill || neutral.label,
        "font-size": spec.size || 14,
        "font-weight": spec.weight || 500,
        opacity: spec.opacity ?? 1,
        className: spec.className || ""
      });
      text.textContent = tr(spec.text);
      svg.appendChild(text);
      return text;
    }

    function yOffset(diagram, value) {
      return (diagram.spacers || []).reduce((total, spacer) => (
        value >= spacer.from ? total + spacer.amount : total
      ), 0);
    }

    function sy(diagram, value) {
      return value + yOffset(diagram, value);
    }

    function shiftPathY(diagram, d) {
      const tokens = d.match(/[A-Za-z]|-?\d+(?:\.\d+)?/g) || [];
      let command = "";
      let coordIndex = 0;
      return tokens.map((token) => {
        if (/^[A-Za-z]$/.test(token)) {
          command = token;
          coordIndex = 0;
          return token;
        }
        const value = Number(token);
        const isVerticalOnly = command.toUpperCase() === "V";
        const isHorizontalOnly = command.toUpperCase() === "H";
        const isYCoordinate = isVerticalOnly || (!isHorizontalOnly && coordIndex % 2 === 1);
        coordIndex += 1;
        const shifted = isYCoordinate ? sy(diagram, value) : value;
        return Number.isInteger(shifted) ? String(shifted) : String(Number(shifted.toFixed(2)));
      }).join(" ");
    }

    function fitSvgText(textEl, maxWidth, initialSize, minSize = 8.5) {
      try {
        const currentWidth = textEl.getComputedTextLength();
        if (!currentWidth || currentWidth <= maxWidth) return;

        const nextSize = Math.max(minSize, Math.floor((initialSize * maxWidth / currentWidth) * 10) / 10);
        textEl.setAttribute("font-size", nextSize);

        if (nextSize === minSize && textEl.getComputedTextLength() > maxWidth) {
          textEl.setAttribute("textLength", maxWidth);
          textEl.setAttribute("lengthAdjust", "spacingAndGlyphs");
        }
      } catch {
        textEl.setAttribute("font-size", Math.max(minSize, initialSize - 1));
      }
    }

    function drawSection(svg, spec, diagram) {
      const theme = PALETTE[spec.theme];
      const group = svgEl("g", { className: "section" });
      const radius = spec.rx || 14;
      const sectionOffset = yOffset(diagram, spec.spacerRef ?? spec.y);
      const y = spec.y + sectionOffset;
      const labelY = spec.labelY + sectionOffset;
      const labelText = tr(spec.label);
      const labelWidth = Math.max(54, [...labelText].reduce((sum, char) => sum + (char.charCodeAt(0) > 255 ? 12 : 7), 18));

      group.appendChild(svgEl("rect", {
        x: spec.x,
        y,
        width: spec.w,
        height: spec.h,
        rx: radius,
        fill: theme.tint,
        "fill-opacity": spec.emphatic ? 0.065 : 0.045,
        stroke: theme.stroke,
        "stroke-opacity": spec.emphatic ? 0.58 : 0.3,
        "stroke-width": spec.emphatic ? 1 : 0.8,
        "stroke-linecap": "round",
        "stroke-linejoin": "round",
        className: "section-rect"
      }));

      group.appendChild(svgEl("rect", {
        x: spec.labelX - 8,
        y: labelY - 11,
        width: labelWidth,
        height: 22,
        rx: 5,
        fill: "#0e141c",
        "fill-opacity": 0.88
      }));
      group.appendChild(svgEl("text", {
        x: spec.labelX,
        y: labelY,
        "dominant-baseline": "central",
        fill: theme.sub,
        "font-size": 12,
        "font-weight": 600,
        className: "section-label"
      }, []));
      group.lastChild.textContent = tr(spec.label);
      svg.appendChild(group);
    }

    function drawEdge(svg, prefix, spec, diagram) {
      const attrs = {
        fill: "none",
        stroke: spec.stroke || neutral.line,
        "stroke-width": spec.width || 1.7,
        "stroke-linecap": "round",
        "stroke-linejoin": "round",
        opacity: spec.opacity ?? 1,
        className: "connector"
      };
      if (spec.arrow) attrs["marker-end"] = `url(#${prefix}-arrow)`;
      if (spec.dashed) attrs["stroke-dasharray"] = "6 5";

      if (spec.type === "path") {
        svg.appendChild(svgEl("path", { ...attrs, d: shiftPathY(diagram, spec.d) }));
      } else {
        svg.appendChild(svgEl("line", {
          ...attrs,
          x1: spec.x1,
          y1: sy(diagram, spec.y1),
          x2: spec.x2,
          y2: sy(diagram, spec.y2)
        }));
      }
    }

    function drawNode(svg, prefix, spec, diagram) {
      const theme = PALETTE[spec.theme];
      const group = svgEl("g", { className: `node node-${spec.theme}` });
      const cx = spec.x + spec.w / 2;
      const y = sy(diagram, spec.y);
      if (spec.shape === "diamond") {
        const cy = y + spec.h / 2;
        group.appendChild(svgEl("polygon", {
          points: `${cx},${y} ${spec.x + spec.w},${cy} ${cx},${y + spec.h} ${spec.x},${cy}`,
          fill: `url(#${prefix}-${spec.theme})`,
          stroke: theme.stroke,
          "stroke-width": 1,
          filter: `url(#${prefix}-soft-shadow)`,
          className: "node-diamond"
        }));
      } else {
        group.appendChild(svgEl("rect", {
          x: spec.x,
          y,
          width: spec.w,
          height: spec.h,
          rx: spec.rx || 8,
          fill: `url(#${prefix}-${spec.theme})`,
          stroke: theme.stroke,
          "stroke-width": 1,
          filter: `url(#${prefix}-soft-shadow)`,
          className: "node-rect"
        }));
      }

      svg.appendChild(group);
      spec.lines.forEach((lineSpec) => {
        const fill = lineSpec.type === "sub" ? theme.sub : theme.text;
        const size = lineSpec.size || (lineSpec.type === "sub" ? 12 : 14);
        const weight = lineSpec.weight || (lineSpec.type === "sub" ? 440 : 620);
        const textEl = svgEl("text", {
          x: lineSpec.x || cx,
          y: sy(diagram, lineSpec.y),
          "text-anchor": lineSpec.anchor || "middle",
          "dominant-baseline": "central",
          fill,
          "font-size": size,
          "font-weight": weight,
          className: "node-text"
        }, []);
        textEl.textContent = tr(lineSpec.text);
        group.appendChild(textEl);
        const maxTextWidth = lineSpec.maxWidth || (spec.shape === "diamond" ? spec.w * 0.7 : spec.w - 18);
        fitSvgText(textEl, maxTextWidth, size, lineSpec.minSize || 8.5);
      });
    }

    function drawLabel(svg, spec, diagram) {
      drawText(svg, {
        ...spec,
        y: sy(diagram, spec.y),
        fill: spec.fill || neutral.label,
        weight: spec.weight || 500
      });
    }

    function estimateSvgTextWidth(text, fontSize = 11) {
      return [...text].reduce((sum, char) => sum + (char.charCodeAt(0) > 255 ? fontSize : fontSize * 0.55), 0);
    }

    function drawLegend(svg, prefix, legendSpec, diagram) {
      const swatch = legendSpec.swatchSize || 12;
      const textGap = legendSpec.textGap || 6;
      const itemGap = legendSpec.gap || 16;
      const fontSize = legendSpec.fontSize || 11;
      const items = legendSpec.items.map((item) => {
        const text = tr(item.label);
        return {
          ...item,
          text,
          width: swatch + textGap + estimateSvgTextWidth(text, fontSize)
        };
      });
      const totalWidth = items.reduce((sum, item, index) => sum + item.width + (index ? itemGap : 0), 0);
      const viewWidth = diagram.width || 680;
      const margin = legendSpec.margin || 24;
      const scale = Math.min(1, (viewWidth - margin * 2) / totalWidth);
      const startX = (viewWidth - totalWidth * scale) / 2;
      const group = svgEl("g", {
        className: "flow-legend",
        transform: `translate(${startX}, ${sy(diagram, legendSpec.y)}) scale(${scale})`
      });

      let cursorX = 0;
      items.forEach((item, index) => {
        if (index) cursorX += itemGap;
        const theme = PALETTE[item.theme];
        group.appendChild(svgEl("rect", {
          x: cursorX,
          y: 0,
          width: swatch,
          height: swatch,
          rx: 3,
          fill: `url(#${prefix}-${item.theme})`,
          stroke: theme.stroke,
          "stroke-width": 0.8,
          className: "legend-swatch"
        }));
        group.appendChild(svgEl("text", {
          x: cursorX + swatch + textGap,
          y: swatch - 1,
          fill: neutral.label,
          "font-size": fontSize,
          "font-weight": 500,
          className: "legend-text"
        }));
        group.lastChild.textContent = item.text;
        cursorX += item.width;
      });
      svg.appendChild(group);
    }

    function renderDiagram(diagram) {
      const mount = document.getElementById(diagram.mount);
      const svg = svgEl("svg", {
        className: "flow-svg",
        viewBox: `0 0 680 ${diagram.height}`,
        role: "img",
        "aria-labelledby": `${diagram.prefix}-title ${diagram.prefix}-desc`,
        xmlns: SVG_NS
      });

      svg.appendChild(svgEl("title", { id: `${diagram.prefix}-title` }));
      svg.lastChild.textContent = tr(diagram.title);
      svg.appendChild(svgEl("desc", { id: `${diagram.prefix}-desc` }));
      svg.lastChild.textContent = tr(diagram.desc);

      addDefs(svg, diagram.prefix);
      diagram.sections.forEach((item) => drawSection(svg, item, diagram));
      diagram.edges.forEach((item) => drawEdge(svg, diagram.prefix, item, diagram));
      diagram.nodes.forEach((item) => drawNode(svg, diagram.prefix, item, diagram));
      diagram.labels.forEach((item) => drawLabel(svg, item, diagram));
      drawLegend(svg, diagram.prefix, diagram.legend, diagram);

      mount.replaceChildren(svg);
    }


    function renderApp() {

      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";

    function bindHighlightAccordions() {
      document.querySelectorAll("[data-highlight-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.highlightIndex);
          const item = document.getElementById(`highlight-${index}`);
          if (!item) return;

          if (expandedHighlights.has(index)) {
            expandedHighlights.delete(index);
            item.classList.remove("expanded");
            button.setAttribute("aria-expanded", "false");
          } else {
            expandedHighlights.add(index);
            item.classList.add("expanded");
            button.setAttribute("aria-expanded", "true");
            setTimeout(() => item.scrollIntoView({ block: "nearest", behavior: "smooth" }), 40);
          }
        });
      });
    }

    function renderManualMedia(block) {
      if (!block.media) return "";
      const preload = block.media.preload || "metadata";
      const media = block.media.video
        ? `<video controls muted loop playsinline preload="${escapeHTML(preload)}" aria-label="${escapeHTML(block.media.caption)}">
            <source src="${escapeHTML(block.media.video)}" type="video/mp4">
          </video>`
        : `<img src="${escapeHTML(block.media.image)}" alt="${escapeHTML(block.media.caption)}" loading="lazy">`;
      return `
        <details class="manual-media-toggle"${block.media.open ? " open" : ""}>
          <summary>${escapeHTML(block.media.label)}</summary>
          <figure class="manual-media-panel">
            ${media}
          </figure>
        </details>
      `;
    }

      const data = copy();
      return `

          `).join("")}

      `;

    function prefersReducedMotion() {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }

    function scrollToSectionTop() {
      window.scrollTo({ top: 0, behavior: "auto" });
      window.requestAnimationFrame(() => {
        window.scrollTo({ top: 0, behavior: "auto" });
      });
    }

    function triggerPageTransition(direction) {
      if (prefersReducedMotion()) return;
      const shell = document.querySelector(".app-shell");
      if (!shell) return;
      shell.classList.remove("page-switch-next", "page-switch-prev");
      void shell.offsetWidth;
      shell.classList.add(direction === "prev" ? "page-switch-prev" : "page-switch-next");
      window.setTimeout(() => {
        shell.classList.remove("page-switch-next", "page-switch-prev");
      }, 420);
    }

    function goToSection(sectionKey, direction) {
      if (!sectionOrder.includes(sectionKey)) return;
      const previousIndex = sectionOrder.indexOf(activeSection);
      const nextIndex = sectionOrder.indexOf(sectionKey);
      const transitionDirection = direction || (nextIndex < previousIndex ? "prev" : "next");
      if (sectionKey === activeSection) {
        scrollToSectionTop();
        return;
      }

      scrollToSectionTop();
      activeSection = sectionKey;
      renderApp();
      pagingLockedUntil = performance.now() + pagingLockMs;
      resetPagingIntent();
      scrollToSectionTop();
      triggerPageTransition(transitionDirection);
    }

    function bindManualMediaToggles() {
      const playManualVideo = (video) => {
        const playRequest = video.play();
        if (playRequest && typeof playRequest.catch === "function") {
          playRequest.catch(() => {});
        }
      };

      document.querySelectorAll(".manual-media-toggle").forEach((toggle) => {
        const video = toggle.querySelector("video");
        if (!video) return;

        toggle.addEventListener("toggle", () => {
          if (toggle.open) {
            playManualVideo(video);
            return;
          }

          video.pause();
          try {
            video.currentTime = 0;
          } catch (error) {}
        });

        if (toggle.open) {
          playManualVideo(video);
        }
      });
    }

    function isInteractiveScrollTarget(target) {
      return Boolean(target.closest?.("video, audio, button, summary, a, input, textarea, select, [contenteditable='true']"));
    }

    function resetPagingIntent() {
      pagingIntent = { direction: "", distance: 0, startedAt: 0, lastAt: 0 };
    }

    function getPagingTarget(direction, currentIndex) {
      if (direction === "next" && currentIndex < sectionOrder.length - 1) {
        return sectionOrder[currentIndex + 1];
      }
      if (direction === "prev" && currentIndex > 0) {
        return sectionOrder[currentIndex - 1];
      }
      return "";
    }

    function recordPagingIntent(direction, deltaY) {
      const now = performance.now();
      if (
        pagingIntent.direction !== direction ||
        now - pagingIntent.lastAt > pagingStaleMs
      ) {
        pagingIntent = { direction, distance: 0, startedAt: now, lastAt: now };
      }

      pagingIntent.distance += Math.min(Math.abs(deltaY), pagingEventCap);
      pagingIntent.lastAt = now;

      const duration = now - pagingIntent.startedAt;
      return (
        pagingIntent.distance >= pagingDistanceThreshold ||
        (duration >= pagingDurationThreshold && pagingIntent.distance >= pagingDurationMinDistance)
      );
    }

    function handleSectionPaging(deltaY, eventTarget, event) {
      if (Math.abs(deltaY) < 8) return;
      if (performance.now() < pagingLockedUntil) return;
      if (eventTarget && isInteractiveScrollTarget(eventTarget)) return;

      const scrollRoot = document.scrollingElement || document.documentElement;
      const atTop = window.scrollY <= 8;
      const atBottom = window.scrollY + window.innerHeight >= scrollRoot.scrollHeight - 8;
      const currentIndex = sectionOrder.indexOf(activeSection);
      const direction = deltaY > 0 ? "next" : "prev";
      const atPagingBoundary = direction === "next" ? atBottom : atTop;
      const targetSection = getPagingTarget(direction, currentIndex);

      if (!atPagingBoundary || !targetSection) {
        resetPagingIntent();
        return;
      }

      if (recordPagingIntent(direction, deltaY)) {
        event?.preventDefault();
        goToSection(targetSection, direction);
      } else {
        event?.preventDefault();
      }
    }

    function bindSectionPaging() {
      window.addEventListener("wheel", (event) => {
        handleSectionPaging(event.deltaY, event.target, event);
      }, { passive: false });

      window.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0]?.clientY || 0;
        touchLatestY = touchStartY;
        touchPagingFromInteractive = isInteractiveScrollTarget(event.target);
      }, { passive: true });

      window.addEventListener("touchmove", (event) => {
        const nextY = event.touches[0]?.clientY || touchLatestY;
        const deltaY = touchLatestY - nextY;
        touchLatestY = nextY;
        if (touchPagingFromInteractive) return;
        handleSectionPaging(deltaY, null, event);
      }, { passive: false });

      window.addEventListener("touchend", (event) => {
        if (!touchPagingFromInteractive) resetPagingIntent();
      }, { passive: false });
    }

    document.getElementById("global-lang-btn").addEventListener("click", () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      renderApp();
    });

    document.addEventListener("mousemove", (event) => {
      const tip = document.getElementById("cursor-tip");
      if (!tip.classList.contains("visible")) return;
      tip.style.left = `${event.clientX + 16}px`;
      tip.style.top = `${event.clientY + 16}px`;
    });

    const cursorGlow = document.getElementById("cursor-glow");
    const cursorState = { x: window.innerWidth / 2, y: window.innerHeight / 2, frame: 0 };

    function commitCursorGlow() {
      cursorState.frame = 0;
      document.documentElement.style.setProperty("--cursor-x", `${cursorState.x}px`);
      document.documentElement.style.setProperty("--cursor-y", `${cursorState.y}px`);
      document.documentElement.style.setProperty("--cursor-opacity", "1");
    }

    window.addEventListener("pointermove", (event) => {
      if (!cursorGlow) return;
      cursorState.x = event.clientX;
      cursorState.y = event.clientY;
      if (!cursorState.frame) {
        cursorState.frame = window.requestAnimationFrame(commitCursorGlow);
      }
    });

    window.addEventListener("pointerleave", () => {
      document.documentElement.style.setProperty("--cursor-opacity", "0");
    });

    window.addEventListener("blur", () => {
      document.documentElement.style.setProperty("--cursor-opacity", "0");
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderApp();
      bindSectionPaging();
    });
  </script>
</body>
</html>
